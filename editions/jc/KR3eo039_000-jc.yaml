body:
  text: 第一類植物類食療方蘿蔔粥食品大蘿蔔五個主療消渴舌焦口乾小便數方法煮熟絞取汁用粳米三合同水並汁煮粥食之小麥粥食品小麥不以多少主療消渴口乾方法淘淨煮粥或炊作飯空腹食之馬齒菜粥食品馬齒菜主療腳氣頭面水腫心腹脹滿小便淋澀方法洗淨取汁和粳米同煮粥空腹食之葛粉羹食品葛根半斤搗取粉四兩荊芥穗一兩豉三合主療中風心脾風熱言語蹇澀精神昏憒手足不遂方法先以水煮荊芥豉六七沸去滓取汁次將葛粉作索麵於汁中煮熟空心服之荊芥粥食品荊芥穗一兩薄荷葉一兩豉三會白粟米三合主療中風言語蹇澀精神昏憒口面喎斜方法以水四升煮取三升去滓下米煮粥空腹食之麻子粥食品冬麻子二兩炒去皮研白粟米三合薄荷葉一兩荊芥穗一兩主療中風五臟風熱語言蹇澀手足不遂大腸滯澀方法水三升煮薄荷荊芥去滓取汁入麻子仁同煮粥空腹食之惡實菜食品惡實菜葉嫩肥者酥油主療中風燥熱口乾手足不遂及皮膚熱瘡方法以湯煮惡實葉三五升取出以新水淘過布絞取汁入五味酥點食之蓮子粥食品蓮子一升去心主療心志不寧補中強志聰明耳目方法煮熟研如泥與粳米三合作粥空腹食之雞頭粥食品雞頭實三合主療精氣不足強志明耳目方法煮熟研如泥與粳米一合煮粥食之葵菜羹食品葵菜葉不以多少主療小便癃閉不通方法洗擇淨煮作羹入五味空腹食之生地黃粥食品生地黃汁二合主療虛勞瘦弱骨蒸寒熱往來咳嗽唾血方法煮白粥臨熟時入地黃汁攪勻空腹食之生地黃粥食品生地黃汁一合酸棗仁水絞取汁二盞主療虛弱骨蒸四肢無力漸漸羸瘦心煩不得睡臥方法水煮同熬數沸次下米三合煮粥空腹食之酸棗粥食品酸棗仁一碗主療虛勞心煩不得睡臥方法用水絞取汁下米三合煮粥空腹食之桃仁粥食品桃仁三兩主療心腹痛上氣咳嗽胸膈妨滿喘急方法湯煮熟去尖皮研取汁和粳米同煮粥空腹食之椒面羹食品川椒三錢炒為末白麵四兩主療脾胃虛弱久患冷氣心腹結痛嘔吐不能下食方法同和勻入鹽少許於豆豉作麵條煮羹食之蓽茇粥食品蓽茇一兩胡椒一兩桂五錢主療脾胃虛弱心腹冷氣病痛妨悶不能食方法三味為末每用三錢水三大碗入豉半合同煮令熟去滓下米三合作粥空服食之良薑粥食品高良薑半兩為末粳米三合主療心腹冷痛積聚停飲方法水三大碗煎高良薑至二碗去滓下米煮粥食之效驗吳茱萸粥食品吳茱萸半兩主療心腹冷氣衡脅肋痛方法水洗去涎焙乾炒為末以米三合一同作粥空腹食之炒黃面食品白麵一斤主療泄痢腸胃不固方法炒令焦黃每日空心溫水調一匙頭第二類動物類食療方乳餅面食品乳餅一個切作豆子樣主療脾胃虛弱赤白泄痢方法用面拌煮熟空腹食之生地黃雞食品生地黃半斤飴糖五兩烏雞一枚主療腰背疼痛骨髓虛損不能久立身重氣乏盜汗少食時復吐利方法先將雞去毛腸肚淨細切地黃與糖相和勻內雞腹中以銅器中放之復置甑中蒸炊飯熟成取食之不用鹽醋唯食肉盡卻飲汁羊密膏食品熟羊脂五兩熟羊髓五兩白沙蜜五兩煉淨生薑汁一合生地黃汁五合主療治虛勞腰痛咳嗽肺痿骨蒸方法以上五味先以羊脂煎令沸次下羊髓又令沸次下蜜地黃生薑汁不住手攪微火熬數沸成膏每日空心溫酒調一匙頭或作羹湯或作粥食之亦可羊臟羹食品羊肝肚腎心肺各一具湯洗淨牛酥一兩胡椒一兩蓽茇一兩豉一合陳皮二錢去白良薑二錢草果兩個蔥五莖主療腎虛勞損骨髓傷敗方法先將羊肚等慢火煮令熟將汁濾淨和羊肝等並藥一同入羊肚內縫合口令絹袋盛之再煮熟入五味旋旋任意食之羊骨粥食品羊骨一付全者捶碎陳皮二錢去白良薑二錢草果二個生薑一兩鹽少許主療治虛勞腰膝無力方法水三汁慢火熬成汁濾出澄清如常作粥或作羹湯亦可羊脊骨羹食品羊脊骨一具全者捶碎肉蓯蓉一兩洗切作片草果三個蓽茇二錢主療治下元久虛腰腎傷敗方法水熬成汁濾去滓入蔥白五味作面羹食之白羊腎羹食品白羊腎二具切作片肉蓯蓉一兩酒浸切羊脂四兩切作片胡椒二錢陳皮一錢去白蓽茇二錢草果二錢主療治虛勞陽道衰敗腰膝無力方法以上各件相和入蔥白鹽醬煮作湯入面𫩏电子如常作羹食之豬腎粥食品豬腎一對去脂膜切粳米三合草果二錢陳皮一錢去白縮砂二錢主療治腎虛勞損腰膝無力疼痛方法先將豬腎陳皮等煮成汁濾去滓入酒少許次下米成粥空心食之枸杞羊腎粥食品枸杞葉一斤羊腎二對細切蔥白一莖羊肉半斤炒主療治陽氣衰敗腰腳疼痛五勞七傷方法以上四味拌勻入五味煮成汁下米熬成粥空腹食之鹿腎羹食品鹿腎一對去脂膜切主療腎虛耳聾方法於豆豉汁入粳米三合煮粥或作羹入五味空心食之羊肉羹食品羊肉半斤細切蘿蔔一個切作片草果一錢陳皮一錢去白良薑一錢蓽茇一錢胡椒一錢蒸白三莖主療腎虛衰弱腰腳無力方法以上諸藥水熬成汁入鹽醬熬湯下麵𫩏电子作羹食之將湯澄清作粥食之亦可鹿蹄湯食品鹿蹄四隻陳皮二錢草果二錢主療諸風虛腰腳疼痛不能踐地方法以上諸藥煮令爛熟取肉入五味空腹食之鹿角酒食品鹿角新者長二三寸燒令赤主療卒患腰痛暫轉不得方法以上件內酒中浸二宿空心飲之立效黑牛髓煎食品黑牛髓半斤生地黃汁半斤白沙蜜半斤煉去蠟主療腎虛弱骨傷敗瘦弱無力方法以上三味和勻蒸成膏空心酒調服之狐肉湯食品狐肉五斤湯洗淨草果五個縮砂二錢蔥一握陳皮一錢去白良薑二錢哈昔泥一錢即阿魏主療虛弱五臟邪氣方法以上諸藥水一斗煮熟去草果等次下胡椒二錢薑黃一錢醋五味調和勻空心食之烏雞湯食品烏雄雞一隻撏洗淨切作塊子陳皮一錢去白良薑一錢胡椒二錢草果二個主療虛弱勞傷心腹邪氣方法以上諸藥以蔥醋醬相和入瓶內封口令煮熟空腹食醍醐酒食品醍醐一盞主療治虛弱去風濕方法以酒一杯和勻溫飲之效驗山藥飥食品羊骨五七塊帶肉蘿蔔一枚切作大片蔥白一莖草果五個陳皮一錢去白良薑一錢胡椒二錢縮砂二錢山藥二斤主療諸虛五勞七傷心腹冷痛骨髓傷敗方法以上諸件同煮取汁澄清濾去粗面二斤山藥二斤煮熟研泥搜面作飥入五味空腹食之山藥粥食品羊肉一斤去脂膜爛煮熟研泥山藥一個煮熟研泥主療虛勞骨蒸久冷方法肉湯內下米三合煮粥空腹食之牛肉脯食品牛肉五斤去脂膜切作大片胡椒五錢蓽茇五錢陳皮二錢去白草果二錢縮砂二錢良薑二錢主療脾胃久冷不思飲食方法上件為細末生薑汁五合蔥汁一合鹽四兩同肉拌勻淹二日取出焙乾作脯任意食之雞頭粉羹原書作雞頭羹粉今據文義改食品雞頭磨成粉羊脊骨一副帶肉熬取汁主療濕痹腰膝痛除暴疾益精氣強心志耳目聰明方法以上各件用生薑汁一合入五味調和空心食之鯽魚羹食品大鯽魚二斤大蒜兩塊胡椒二錢小椒二錢陳皮二錢縮砂二錢蓽茇二錢主療脾胃虛弱泄痢久不瘥者食之立效方法以上各件蔥醬鹽料物蒜入魚肚內煎熟作羹五味調和令勻空心食之炙黃雞食品黃雌雞只撏淨主療脾胃虛弱下痢方法以鹽醬醋茴香小椒末同拌勻刷雞上令炭火炙乾焦空腹食之牛嬭子煎蓽茇法食品牛嬭蓽茇主療貞觀中太宗苦於痢疾眾醫不效問左右能治愈者當重賞時有術士進此方用牛嬭子蒸蓽茇服之立瘥猯肉羹食品猯肉一斤細切蔥一握草果三個主療水腫浮氣腹脹小便澀少方法用小椒豆豉同煮爛熟入粳米一合作羹五味調勻空腹食之黃雌雞食品黃雌雞一隻撏淨草果二錢赤小豆一升主療腹中水癖水腫方法同煮熟空心食之青鴨羹食品青頭鴨一隻退淨草果五個主療十腫水病不瘥方法用赤小豆半升入鴨腹內煮熟五味調空心食野雞羹食品野雞一隻撏淨主療消渴口乾小便頻數方法入五味如常法作羹臛食之鵓鴿羹食品白鵓鴿一隻切作大片主療消渴飲水無度方法用土蘇一同煮熟空腹食之雞子黃食品雞子黃一枚生用主療小便不通方法上件服之不過三服熟亦可食鯉魚湯食品大鯉魚一頭赤小豆一合陳皮二錢去白小椒二錢草果二錢主療消渴水腫黃疸腳氣方法以上件入五味調和勻煮熟空腹食之驢頭羹食品烏驢頭一枚撏洗淨胡椒二錢草果二錢主療中風頭眩手足無力筋骨煩痛言語蹇澀驢肉湯食品烏驢肉不以多少切主療治風狂憂愁不樂安心氣方法於豆豉中爛煮熟入五味空心食之狐肉羹食品狐肉不以多少及五臟主療驚風癲癇神情恍惚言語錯謬歌笑無度方法如常法入五味煮令爛熟空心食之熊肉羹食品熊肉一斤主療諸風腳氣痹痛不仁五緩筋急方法於豆豉中八五味蔥醬煮熟空腹食之烏雞酒食品烏雌雞一隻撏洗淨去腸肚主療治中風背強舌直不得語目睛不轉煩熱方法以酒五升煮取酒二升去滓分作三服相繼服之汁盡無時熬蔥白生薑粥投之蓋覆取汗羊肚羹食品羊肚一枚洗淨粳米二合蔥白數莖豉半合蜀椒去目閉口者炒出汗三十粒生薑二錢半細切主療諸中風方法以上六味拌勻入羊肚內爛煮熟五味調和空心食之烏驢皮湯食品烏驢皮一張撏洗淨主療中風手足不遂骨節煩疼心燥口眼面目喎斜方法蒸熟細切如條於豉汁中入五味調和勻煮過空心食之羊頭膾食品白羊頭一枚撏洗淨主療中風頭眩羸瘦手足無力方法蒸令爛熟細切以五味汁調和膾空腹食之野豬臛食品野豬肉二斤細切主療久痔野雞病下血不止肛門腫滿方法煮令爛熟入五味空心食之獺肝羹食品獺肝一副主療久痔下血不止方法煮熟入五味空腹食之鯽魚羹食品大鯽魚一頭新鮮者洗淨切作片小椒二錢為末草果一錢為末主療久痔腸風大便常有血方法用蔥三莖煮熟入五味空腹食之
